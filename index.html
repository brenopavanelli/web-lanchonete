<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lanchonete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Baloo 2"', 'cursive'],
              body: ['Nunito', 'sans-serif'],
            },
            colors: {
              brand: {
                50:  '#fffbeb',
                100: '#fef3c7',
                200: '#fde68a',
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
              },
              salgado: {
                light: '#fdf6ec',
                warm:  '#f9e4c8',
                mid:   '#e8a85f',
                deep:  '#c47a2b',
                dark:  '#7c4a1e',
              }
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Nunito', sans-serif; background-color: #fdf6ec; }
      .font-display { font-family: 'Baloo 2', cursive; }

      /* Scrollbar customizada */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #fef3c7; }
      ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }

      /* Animação entrada dos cards */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .card-animate { animation: fadeUp 0.4s ease forwards; }

      /* Animação do carrinho */
      @keyframes bounce-in {
        0%   { transform: scale(0.8); opacity: 0; }
        60%  { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
      }
      .bounce-in { animation: bounce-in 0.3s ease forwards; }

      /* Badge do carrinho */
      @keyframes pop {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.4); }
        100% { transform: scale(1); }
      }
      .badge-pop { animation: pop 0.25s ease; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
